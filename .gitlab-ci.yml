deploy_prod:
  stage: deploy_prod
  script:
    - apk update && apk add git
    - chmod +x prod_deploy.sh 
    - ./prod_deploy.sh
  needs: ["security_scan"]  
  rules:
    - if: '$CI_COMMIT_REF_NAME == "sub-main"'
